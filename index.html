<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <title>Detangle</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                overflow: hidden;
                background: #1a1a2e;
            }
            canvas {
                display: block;
            }
            #ui {
                position: fixed;
                top: 16px;
                left: 16px;
                display: flex;
                flex-direction: column;
                gap: 8px;
                font: 13px monospace;
                user-select: none;
            }
            #tangle-btn {
                padding: 8px 18px;
                background: #383838;
                color: #c9c9c9;
                border: 1px solid #555;
                border-radius: 4px;
                cursor: pointer;
                width: fit-content;
            }
            #tangle-btn:hover:not(:disabled) {
                background: #484848;
            }
            #tangle-btn:disabled {
                opacity: 0.5;
                cursor: default;
            }
            #hint {
                color: #777;
            }
            #gh-link {
                position: fixed;
                bottom: 16px;
                left: 16px;
                opacity: 0.7;
            }
            #gh-link:hover {
                opacity: 1;
            }
            #gh-link svg {
                width: 28px;
                height: 28px;
                fill: #fff;
                display: block;
            }
        </style>
    </head>
    <body>
        <canvas id="c"></canvas>
        <div id="ui">
            <button id="tangle-btn" onclick="startTangle()">Tangle</button>
            <span id="hint"
                >left click: drag above </br> right click: drag under</span
            >
        </div>
        <a
            id="gh-link"
            href="https://github.com/nicolasloizeau/Detangle"
            target="_blank"
            rel="noopener"
            aria-label="GitHub"
        >
            <svg viewBox="0 0 16 16" aria-hidden="true">
                <path
                    d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"
                />
            </svg>
        </a>
        <script src="main.js"></script>
        <script src="hard_spheres.js"></script>
        <script src="tangle.js"></script>
        <script src="diagnostics.js"></script>
        <script src="physics.js"></script>
        <script src="rendering.js"></script>
    </body>
</html>
